# Burrow Workflow Bugfix With Pull Request

## Action

Follow the bugfix-with-pull-request workflow:
1. Identify and fix a bug in a source file (e.g., .swift).
2. Commit the fix with a descriptive message.
3. Open a pull request referencing the fix.
4. Merge the pull request, resulting in a merge commit with the same file(s) and referencing the fix.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: macos/Sources/StatusBarController.swift, macos/Sources/CrashReporter.swift, macos/Sources/HUDController.swift

