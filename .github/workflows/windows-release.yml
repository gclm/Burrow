name: windows-release

# Release-grade build of the Windows app (windows/) that BAKES the telemetry
# keys into the assembly from repo secrets, then publishes the unpackaged app
# as an artifact. Manual trigger (workflow_dispatch) so it never collides with
# the macOS tag-triggered release.yml; the full installer/winget packaging
# still lives in windows/scripts/build-release.ps1 (run locally), which picks
# up the same BURROWWIN_* env vars if they're set.
#
# Secrets consumed (set in repo Settings -> Secrets and variables -> Actions):
#   BURROWWIN_SENTRY_DSN        - the separate `burrow-windows` Sentry project DSN
#   BURROWWIN_POSTHOG_API_KEY   - the (shared) PostHog project API key
#   BURROWWIN_POSTHOG_HOST      - optional; defaults to https://us.i.posthog.com
# Any unset secret -> that SDK stays inert and the build still succeeds.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: false
        default: "Release"

permissions:
  contents: read

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: windows
    env:
      # MSBuild exposes these as $(BURROWWIN_*) properties, which the csproj
      # bakes into AssemblyMetadata; TelemetryConfig reads them at runtime.
      BURROWWIN_SENTRY_DSN: ${{ secrets.BURROWWIN_SENTRY_DSN }}
      BURROWWIN_POSTHOG_API_KEY: ${{ secrets.BURROWWIN_POSTHOG_API_KEY }}
      BURROWWIN_POSTHOG_HOST: ${{ secrets.BURROWWIN_POSTHOG_HOST }}
    steps:
      # Pinned to a SHA (supply-chain hygiene), matching windows-ci.yml.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Build the FSL `burrow` conductor at its pinned submodule commit and stage it into Assets\
      # so the csproj bundles it (its Content Include is conditional on Exists). NON-FATAL: without
      # it the app falls back to the direct engine. windows-latest ships a Rust toolchain; the
      # submodule is cloned fresh (checkout doesn't recurse submodules), reusing ENGINE_PAT.
      - name: Build + stage burrow conductor
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          ENGINE_PAT: ${{ secrets.ENGINE_PAT }}
        run: |
          try {
            $sha = (git ls-tree HEAD windows/vendor/burrow-cli).Split()[2]
            $dest = Join-Path $env:RUNNER_TEMP 'burrow-cli'
            # burrow-cli is PUBLIC: clone unauthenticated FIRST. ENGINE_PAT is scoped to
            # burrow-engine only, and an authenticated clone with an unauthorized token 403s
            # (the bug that dropped the conductor from the first macOS 0.10.0 artifact).
            git clone --quiet https://github.com/caezium/burrow-cli.git $dest
            if (-not (Test-Path $dest) -and $env:ENGINE_PAT) {
              git -c "url.https://x-access-token:$($env:ENGINE_PAT)@github.com/.insteadOf=https://github.com/" clone --quiet https://github.com/caezium/burrow-cli.git $dest
            }
            git -C $dest -c advice.detachedHead=false checkout --quiet $sha
            cargo build --release --manifest-path (Join-Path $dest 'Cargo.toml')
            Copy-Item (Join-Path $dest 'target\release\burrow.exe') 'windows\Assets\burrow.exe' -Force
            Write-Host "staged burrow.exe @ $($sha.Substring(0,7))"
          } catch {
            Write-Host "::warning::burrow conductor build failed - Windows app falls back to the direct engine. $_"
          }

      # Surface (without leaking) whether the keys will actually be baked, so a
      # release that silently shipped inert telemetry is easy to spot. Reads the
      # env (set from secrets) rather than interpolating the secret into script.
      - name: Telemetry key presence
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:BURROWWIN_SENTRY_DSN)) {
            Write-Host "::warning::BURROWWIN_SENTRY_DSN is empty - Sentry crash reporting will be inert in this build."
          } else { Write-Host "Sentry DSN present - crash reporting will be active." }
          if ([string]::IsNullOrEmpty($env:BURROWWIN_POSTHOG_API_KEY)) {
            Write-Host "::warning::BURROWWIN_POSTHOG_API_KEY is empty - PostHog analytics will be inert in this build."
          } else { Write-Host "PostHog key present - analytics will be active." }

      - name: Restore
        run: dotnet restore .\BurrowWin.sln

      - name: Publish (telemetry keys baked from secrets)
        run: dotnet publish .\BurrowWin.csproj -c ${{ github.event.inputs.configuration }} -p:Platform=x64 -r win-x64 --self-contained false -o .\artifacts\release-publish -v:minimal

      # A release artifact without the conductor ships with dead features while the run
      # stays green (the macOS 0.10.0 lesson) — hard-assert the publish output.
      - name: Verify the bundled conductor + engine made it into the publish
        shell: pwsh
        run: |
          if (-not (Test-Path ".\artifacts\release-publish\Assets\burrow.exe")) {
            Write-Host "::error::Assets\burrow.exe missing - the conductor did not bundle. Failing the release."
            exit 1
          }
          if (-not (Test-Path ".\artifacts\release-publish\Assets\Mole\mole.ps1")) {
            Write-Host "::error::Assets\Mole engine missing. Failing the release."
            exit 1
          }
          Write-Host "conductor: present / engine: present"

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: burrowwin-win-x64-publish
          path: windows/artifacts/release-publish
          if-no-files-found: error
